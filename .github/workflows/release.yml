name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release JARs
        run: ./gradlew releaseJar releaseCliJar --no-daemon

      - name: Find server JAR
        id: find-server-jar
        run: echo "jar_path=$(find build/libs -name 'attractor-server-*.jar' | grep -v devel | head -1)" >> "$GITHUB_OUTPUT"

      - name: Find CLI JAR
        id: find-cli-jar
        run: echo "jar_path=$(find build/libs -name 'attractor-cli-*.jar' | grep -v devel | head -1)" >> "$GITHUB_OUTPUT"

      - name: Attest server JAR
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.find-server-jar.outputs.jar_path }}

      - name: Attest CLI JAR
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.find-cli-jar.outputs.jar_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.find-server-jar.outputs.jar_path }}
            ${{ steps.find-cli-jar.outputs.jar_path }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
