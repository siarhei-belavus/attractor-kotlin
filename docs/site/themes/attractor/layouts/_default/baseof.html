<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}" data-theme="light">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  {{- partial "header.html" . -}}
  <div class="layout">
    {{- partial "nav.html" . -}}
    <main class="content" data-pagefind-body>
      {{- block "main" . }}{{- end }}
    </main>
  </div>
  {{- partial "footer.html" . -}}
  <script src="{{ "js/attractor.js" | relURL }}"></script>
</body>
</html>
